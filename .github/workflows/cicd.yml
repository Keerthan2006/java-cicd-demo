name: Java CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build Project
        run: mvn -B clean package -DskipTests

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Source
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run Unit Tests
        run: mvn -B test

  code-analysis:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout Source
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run PMD
        run: mvn -B pmd:pmd

      - name: Run SpotBugs
        run: mvn -B spotbugs:check

  sast:
    runs-on: ubuntu-latest
    needs: code-analysis

    steps:
      - name: Checkout Source
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Resolve Dependencies
        run: mvn -B dependency:resolve

      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          format: table
          exit-code: '0'

  docker:
    runs-on: ubuntu-latest
    needs: sast

    steps:
      - name: Checkout Source
        uses: actions/checkout@v7

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/spring-app:${{ github.run_id }}

      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/spring-app:${{ github.run_id }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: '0'

  dast:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull Docker Image
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/spring-app:${{ github.run_id }}

      - name: Run Application Container
        run: |
          docker run -d \
            --name spring-app \
            -p 8080:8080 \
            ${{ secrets.DOCKER_USERNAME }}/spring-app:${{ github.run_id }}

      - name: Wait for Spring Boot Application
        run: |
          echo "Waiting for application..."

          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080 || true)

            if [ "$STATUS" = "200" ] || [ "$STATUS" = "404" ]; then
              echo "Application is running."
              exit 0
            fi

            sleep 5
          done

          echo "Application failed to start."

          docker ps -a
          docker logs spring-app

          exit 1

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "http://localhost:8080"
          fail_action: false

      - name: Stop Container
        if: always()
        run: |
          docker stop spring-app || true
          docker rm spring-app || true
    

  

      
